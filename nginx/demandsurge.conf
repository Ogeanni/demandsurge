# nginx/demandsurge.conf
# Nginx reverse proxy for DemandSurge on AWS EC2.
#
# Routes:
#   /api/* → FastAPI   (port 8000, /api prefix stripped)
#   /*     → Streamlit (port 8501, WebSocket support)
#
# Install:
#   sudo cp nginx/demandsurge.conf /etc/nginx/sites-available/demandsurge
#   sudo ln -s /etc/nginx/sites-available/demandsurge /etc/nginx/sites-enabled/demandsurge
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

upstream fastapi_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream streamlit_frontend {
    server 127.0.0.1:8501;
    keepalive 32;
}

server {
    listen 80;
    server_name _;   # Matches any hostname / IP

    # ── Timeouts — agent reasoning takes 15-30s ───────────────────────
    proxy_connect_timeout 120s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # ── Request size ──────────────────────────────────────────────────
    client_max_body_size 10M;

    # ── Proxy headers shared across all locations ─────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ══════════════════════════════════════════════════════════════════
    # FastAPI — /api/* prefix
    # Strips /api before forwarding so FastAPI sees /health, /chat etc.
    # ══════════════════════════════════════════════════════════════════
    location /api/ {
        proxy_pass         http://fastapi_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # ══════════════════════════════════════════════════════════════════
    # Streamlit WebSocket endpoints — MUST come before the catch-all /
    # Streamlit uses WebSockets for live UI updates.
    # Missing these causes the UI to load but immediately freeze.
    # ══════════════════════════════════════════════════════════════════

    # Main WebSocket stream
    location /_stcore/stream {
        proxy_pass         http://streamlit_frontend/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    # Health check WebSocket
    location /_stcore/health {
        proxy_pass         http://streamlit_frontend/_stcore/health;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # Streamlit static files
    location /static/ {
        proxy_pass         http://streamlit_frontend/static/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # Streamlit component files
    location /component/ {
        proxy_pass         http://streamlit_frontend/component/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # ══════════════════════════════════════════════════════════════════
    # Streamlit — catch-all for all other routes
    # Must be last so specific locations above take priority
    # ══════════════════════════════════════════════════════════════════
    location / {
        proxy_pass         http://streamlit_frontend/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}